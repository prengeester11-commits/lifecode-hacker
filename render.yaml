services:
  - type: web
    name: lifecode-hacker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1 --threads 4
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GMAIL_ADDRESS
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: FREE_CODE
        sync: false
      - key: ADMIN_KEY
        sync: false
      - key: TOSS_CLIENT_KEY
        sync: false
      - key: TOSS_SECRET_KEY
        sync: false
      - key: FLASK_SECRET_KEY
        sync: false
      - key: FLASK_DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.7"
